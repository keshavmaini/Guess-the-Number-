<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Guess the Number!</h1>
        <p>I'm thinking of a number between 1 and 50. Can you guess it?</p>
        <div class="guess-area">
            <input type="number" id="guessInput" min="1" max="50">
            <button id="checkBtn">Check My Guess</button>
        </div>
        <p id="message"></p>
        <button id="resetBtn" style="display: none;">Play Again</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
